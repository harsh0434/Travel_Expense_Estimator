<form method="POST" action="{% url 'estimate' %}">
    {% csrf_token %}
    
    <label>Destination:</label>
    <input type="text" name="destination" value="{{ destination }}" required>

    <label>Travel Mode:</label>
    <select name="travel_mode">
        <option value="Car" {% if travel_mode == "Car" %}selected{% endif %}>Car</option>
        <option value="Train" {% if travel_mode == "Train" %}selected{% endif %}>Train</option>
        <option value="Flight" {% if travel_mode == "Flight" %}selected{% endif %}>Flight</option>
    </select>

    <label>Number of People:</label>
    <input type="number" name="num_people" value="{{ num_people }}" required>

    <label>Number of Days:</label>
    <input type="number" name="num_days" value="{{ num_days }}" required>

    <button type="submit">Estimate Cost</button>
</form>

{% if estimated_cost %}
    <p>Estimated Cost: ₹{{ estimated_cost }}</p>
{% endif %}

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
